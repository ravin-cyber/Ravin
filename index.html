<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSK Free Fire Accounts</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #1a0000, #660000);
    color: white;
    margin: 0;
}

h1 {
    color: #ff4d4d;
    font-size: 22px;
    padding: 10px;
}

#timer {
    font-size: 18px;
    font-weight: bold;
    margin: 10px;
    color: #ffcc00;
}

/* 🔥 ONE BY ONE */
.container {
    display: grid;
    grid-template-columns: 1fr; /* ONE ITEM PER ROW */
    gap: 15px;
    padding: 10px;
}

.card {
    width: 100%;
    height: 320px;
    border-radius: 15px;
    overflow: hidden;
    background: #330000;
    box-shadow: 0 0 15px rgba(255,0,0,0.7);
}

/* 🔥 IMAGE PERFECT FIT */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover; /* fills box fully */
}

.price {
    font-size: 18px;
    font-weight: bold;
    color: #ff4d4d;
    margin: 5px 0;
}

.old-price {
    text-decoration: line-through;
    color: #bbb;
    font-size: 13px;
}

button {
    width: 100%;
    padding: 12px;
    background: #ff1a1a;
    border: none;
    font-weight: bold;
    color: white;
    font-size: 16px;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
}

.popup-content {
    background: white;
    color: black;
    padding: 20px;
    margin: 40% auto;
    width: 80%;
    border-radius: 10px;
}

.popup button {
    background: red;
    margin: 5px 0;
}
</style>
</head>

<body>

<h1>🔥 TSK Free Fire Account Store 🔥</h1>
<div id="timer">⏳ Offer ends in: 24:00:00</div>

<div class="container">

<!-- Account 1 -->
<div class="card">
    <img src="acc1.jpg">
    <p class="price">₹999 <span class="old-price">₹1499</span></p>
    <button onclick="openPopup('Account 1 - ₹999')">Buy Now</button>
</div>

<!-- Account 2 -->
<div class="card">
    <img src="acc2.jpg">
    <p class="price">₹799 <span class="old-price">₹1199</span></p>
    <button onclick="openPopup('Account 2 - ₹799')">Buy Now</button>
</div>

<!-- Account 3 -->
<div class="card">
    <img src="acc3.jpg">
    <p class="price">₹1299 <span class="old-price">₹1799</span></p>
    <button onclick="openPopup('Account 3 - ₹1299')">Buy Now</button>
</div>

<!-- Account 4 -->
<div class="card">
    <img src="acc4.jpg">
    <p class="price">₹599 <span class="old-price">₹899</span></p>
    <button onclick="openPopup('Account 4 - ₹599')">Buy Now</button>
</div>

</div>

<!-- Popup -->
<div id="popup" class="popup">
    <div class="popup-content">
        <h3>Select Seller</h3>
        <button onclick="sendWhatsApp(1)">TSK Gaming</button>
        <button onclick="sendWhatsApp(2)">Zoro Gaming</button>
        <button onclick="closePopup()">Cancel</button>
    </div>
</div>

<script>
let selectedProduct = "";

function openPopup(product) {
    selectedProduct = product;
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function sendWhatsApp(option) {
    let number1 = "919042458779";
    let number2 = "917339213791";

    let message = "I want to buy " + selectedProduct;

    let url = option === 1
        ? `https://wa.me/${number1}?text=${encodeURIComponent(message)}`
        : `https://wa.me/${number2}?text=${encodeURIComponent(message)}`;

    window.location.href = url;
}

/* 24H TIMER */
let timeLeft = 24 * 60 * 60;

function startTimer() {
    let h = Math.floor(timeLeft / 3600);
    let m = Math.floor((timeLeft % 3600) / 60);
    let s = timeLeft % 60;

    document.getElementById("timer").innerHTML =
        "⏳ Offer ends in: " +
        String(h).padStart(2,'0') + ":" +
        String(m).padStart(2,'0') + ":" +
        String(s).padStart(2,'0');

    if (timeLeft > 0) timeLeft--;
}

setInterval(startTimer, 1000);
</script>

</body>
</html>
