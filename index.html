<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSK Free Fire Shop</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0a0000, #660000);
    color: white;
    text-align: center;
}

.logo {
    width: 120px;
    margin-top: 10px;
}

h1 {
    color: #ff2e2e;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 15px;
    padding: 15px;
}

/* CARD */
.card {
    perspective: 1000px;
    cursor: pointer;
}

.card-inner {
    position: relative;
    height: 500px; /* 🔥 increased card height */
    transition: 0.8s;
    transform-style: preserve-3d;
}

.card.flipped .card-inner {
    transform: rotateY(180deg);
}

/* FRONT + BACK */
.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
    overflow: hidden;
    box-shadow: 0 0 10px black;
}

.card-back {
    transform: rotateY(180deg);
    background: #2a0000;
    padding: 10px;
}

/* 🔥 BIGGER IMAGE (LATEST FIX) */
.card-front img {
    width: 100%;
    height: 340px;   /* 👈 VERY BIG IMAGE */
    object-fit: cover;
    object-position: center;
}

/* PRICE */
.price {
    background: gold;
    color: black;
    font-weight: bold;
    padding: 5px;
}

/* TIMER */
.timer {
    font-size: 12px;
    color: #00ffcc;
    margin: 5px 0;
}

/* BUY BUTTON */
.buy-btn {
    margin: 10px auto;
    width: 80%;
    padding: 8px;
    background: red;
    border: none;
    color: white;
    border-radius: 8px;
}

/* NEXT */
.next-btn {
    margin: 15px;
    padding: 10px 20px;
    background: #ff2e2e;
    border: none;
    color: white;
    border-radius: 8px;
    font-weight: bold;
}

/* FOOTER */
footer {
    margin: 15px;
    font-size: 12px;
    color: #aaa;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.popup-box {
    background:#1a0000;
    padding:20px;
    border-radius:10px;
    width:80%;
    max-width:300px;
}

.popup-box button {
    width:100%;
    margin:10px 0;
    padding:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

.tsk { background:red; color:white; }
.zoro { background:orange; color:white; }
.close { background:gray; color:white; }
</style>
</head>

<body>

<img src="logo.png" class="logo">

</div>

<div class="card-back">
<h3>Account 1</h3>
Rare Skins<br>Elite Pass<br>Heroic Rank
</div>

</div>
</div>

</div>
<div class="card-back">Level 65 Account</div>
</div>
</div>

<!-- CARD 3 -->
<div class="card" onclick="flip(this)">

<img src="acc3.jpg">
<div class="price">₹399 OFFER</div>

<button class="buy-btn" onclick="event.stopPropagation(); openPopup()">BUY NOW</button>
</div>

</div>

<script>
function flip(card){
    card.classList.toggle("flipped");
}

function openPopup(){
    document.getElementById("popup").style.display="flex";
}
function closePopup(){
    document.getElementById("popup").style.display="none";
}

function goTSK(){
    window.open("https://wa.me/919042458779","_blank");
}
function goZORO(){
    window.open("https://wa.me/917339213791","_blank");
}

// TIMER
document.querySelectorAll(".timer").forEach(t=>{
let time=86400;
setInterval(()=>{
if(time>0){
time--;
let h=Math.floor(time/3600);
let m=Math.floor((time%3600)/60);
let s=time%60;
t.innerText="Ends: "+h+":"+m+":"+s;
}
},1000);
});
</script>
