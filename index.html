<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSK Free Fire Accounts</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1a0000, #660000);
    color: white;
    text-align: center;
}

h1{
    padding: 10px;
    color: #ff4d4d;
}

/* GRID */
.container{
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    padding: 10px;
}

/* CARD */
.card{
    width: 100%;
    border-radius: 15px;
    overflow: hidden;
}

/* FLIP AREA ONLY (IMAGE) */
.inner{
    width: 100%;
    height: 340px;
    position: relative;
    perspective: 1000px;
}

/* FLIP */
.inner.flip-active .flip-box{
    transform: rotateY(180deg);
}

.flip-box{
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

/* FRONT + BACK */
.front, .back{
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    backface-visibility: hidden;
    box-shadow: 0 0 15px rgba(255,0,0,0.6);
}

/* FRONT IMAGE */
.front img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BACK */
.back{
    background: #2a0000;
    transform: rotateY(180deg);
    padding: 10px;
    box-sizing: border-box;
    text-align: left;
}

.back h3{
    text-align: center;
    color: #ff4d4d;
}

.desc{
    font-size: 12px;
    background: #1a0000;
    padding: 8px;
    border-radius: 8px;
    line-height: 1.4;
}

.price{
    font-size: 18px;
    font-weight: bold;
    color: #ff4d4d;
}

.old-price{
    text-decoration: line-through;
    color: #bbb;
    font-size: 13px;
}

.sale{
    margin-top: 8px;
    font-size: 13px;
    color: #ffcc00;
    font-weight: bold;
}

/* ✅ BUY BUTTON (STATIC - NOT FLIPPING) */
.buy-section{
    padding: 10px;
}

.buy-btn{
    width: 100%;
    padding: 12px;
    background: #ff1a1a;
    border: none;
    font-weight: bold;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🔥 TSK Free Fire Account Store 🔥</h1>

<div class="container">

<!-- CARD 1 -->
<div class="card">

    <!-- FLIP IMAGE ONLY -->
    <div class="inner" onclick="flip(this)">
        <div class="flip-box">

            <div class="front">
                <img src="acc1.jpg">
            </div>

            <div class="back">
                <h3>Account 1</h3>

                <div class="desc">
                    ✔ Rare Skins<br>
                    ✔ Level 70+ Account<br>
                    ✔ High Rank ID<br>
                    ✔ Full Access
                </div>

                <p class="price">₹999 <span class="old-price">₹1499</span></p>

                <div class="sale">
                    ⏳ Sale ends in: <span id="t1">24:00:00</span>
                </div>
            </div>

        </div>
    </div>

    <!-- ✅ BUY BUTTON OUTSIDE FLIP -->
    <div class="buy-section">
        <button class="buy-btn" onclick="openPopup('Account 1 - ₹999')">
            Buy Now
        </button>
    </div>

</div>

<!-- CARD 2 -->
<div class="card">

    <div class="inner" onclick="flip(this)">
        <div class="flip-box">

            <div class="front">
                <img src="acc2.jpg">
            </div>

            <div class="back">
                <h3>Account 2</h3>

                <div class="desc">
                    ✔ Legendary Skins<br>
                    ✔ Premium ID<br>
                    ✔ High Rank
                </div>

                <p class="price">₹799 <span class="old-price">₹1199</span></p>

                <div class="sale">
                    ⏳ Sale ends in: <span id="t2">24:00:00</span>
                </div>
            </div>

        </div>
    </div>

    <div class="buy-section">
        <button class="buy-btn" onclick="openPopup('Account 2 - ₹799')">
            Buy Now
        </button>
    </div>

</div>

</div>

<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);">
    <div style="background:white;color:black;padding:20px;margin:40% auto;width:80%;border-radius:10px;">
        <h3>Select Seller</h3>
        <button onclick="sendWhatsApp(1)">TSK Gaming</button>
        <button onclick="sendWhatsApp(2)">Zoro Gaming</button>
        <button onclick="closePopup()">Cancel</button>
    </div>
</div>

<script>

let selectedProduct="";

function flip(el){
    el.classList.toggle("flip-active");
}

function openPopup(p){
    selectedProduct=p;
    document.getElementById("popup").style.display="block";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

function sendWhatsApp(opt){
    let n1="919042458779";
    let n2="917339213791";

    let msg="🔥 I want to buy "+selectedProduct;

    let url = opt===1
    ? `https://wa.me/${n1}?text=${encodeURIComponent(msg)}`
    : `https://wa.me/${n2}?text=${encodeURIComponent(msg)}`;

    window.location.href=url;
}

/* TIMER */
let t=24*60*60;

function runTimer(){
    function format(s){
        let h=Math.floor(s/3600);
        let m=Math.floor((s%3600)/60);
        let sec=s%60;
        return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0')+":"+String(sec).padStart(2,'0');
    }

    if(t>0) t--;

    document.getElementById("t1").innerHTML=format(t);
    document.getElementById("t2").innerHTML=format(t);
}

setInterval(runTimer,1000);

</script>

</body>
</html>
